name: Build and Push Native Image

on:
  push:
    branches: 
      - master
      - production
      - development
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Run Maven Tests
        run: mvn test

  build-native:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: 'maven'

      - name: Install UPX
        run: |
          sudo apt-get install -y --no-install-recommends upx-ucl

      - name: Build Native Binary
        run: |
          mvn -Pnative clean package -DskipTests -Dspring-boot.native.build-args="-march=x86-64 -O2 -J-Xmx6g"

      - name: Compress Binary with UPX
        run: upx target/gestion

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.native-simple
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gestion-native:latest
            ${{ secrets.DOCKER_USERNAME }}/gestion-native:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
